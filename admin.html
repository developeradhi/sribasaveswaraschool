<!-- admin.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - Result Portal</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { background: #eceef7; font-family:'Poppins',sans-serif; display:flex;justify-content:center;align-items:center;height:100vh;}
    .box { background: #fff; border-radius:16px; padding:2.6rem 2rem; box-shadow:0 12px 37px rgba(68,128,230,0.17); min-width:320px;}
    h2 { color:#144090; font-family:'Playfair Display',serif; margin:0 0 30px 0;}
    input[type=password],input[type=text] { width:100%;padding:.7em 1em; font-size:1rem; border-radius:8px;margin-bottom:1.1em;border:1px solid #bec8de;}
    button { background:#1451b5;color:#fff;padding:.7em 0;width:100%; font-weight:600; border:none;border-radius:9px; font-size:1.08rem;}
    .status { margin-top:1.1em;height:1.2em;font-weight:600;}
  </style>
</head>
<body>
<div class="box">
  <h2>Admin Login</h2>
  <input id="pass" type="password" placeholder="Enter admin password" autocomplete="off" />
  <button onclick="login()">Login</button>
  <div class="status" id="status"></div>
</div>
<script>
  const apiUrl = "YOUR_DEPLOYED_APPS_SCRIPT_URL"; // Must be same as backend
  async function login() {
    const pass = document.getElementById('pass').value.trim();
    const statusEl = document.getElementById('status');
    statusEl.textContent = "Authenticating...";
    try {
      const resp = await fetch(apiUrl, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action:'admin_login', password: pass})
      });
      const r = await resp.json();
      if(r.status === "ok") {
        statusEl.textContent = "Success! Redirecting...";
        setTimeout(() => {
          window.location.href = `YOUR_SCRIPT_WEB_APP_URL?page=dashboard&auth_token=${r.auth_token}`;
        },1200);
      } else {
        statusEl.textContent = "Invalid password!";
      }
    } catch(e) {
      statusEl.textContent = "Network error: "+e;
    }
  }
</script>
</body>
</html>

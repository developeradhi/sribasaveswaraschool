  <meta charset="UTF-8" />

  <title>School Result Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet" />

<body>
  <main class="container" role="main" aria-label="Student Result Portal">
    <h1>School Result Portal</h1>
    <form id="searchForm" autocomplete="off" aria-label="Check Student Results">
      <label for="rollNo">Roll Number</label>
      <input type="text" id="rollNo" name="rollNo" placeholder="Enter Roll Number" required aria-required="true" autofocus />
      <label for="dob">Date of Birth</label>
      <input type="date" id="dob" name="dob" required aria-required="true" max="" />
      <button type="submit" aria-label="Show student result">Show Result</button>
    </form>
    <div id="status" role="alert" aria-live="polite"></div>
    <section id="result-section" aria-live="polite" aria-label="Student Result">
      <div id="welcome"></div>
      <div class="cards" role="region" aria-label="Student performance summary">
        <div class="card">Grade: <span id="grade"></span></div>
        <div class="card">Percentage: <span id="percent"></span>%</div>
        <div class="card">Total Marks: <span id="total"></span></div>
      </div>
      <canvas id="marksChart" role="img"></canvas>
      <div class="button-row">
        <button id="downloadBtn" aria-label="Download result report">Download Report</button>
        <button id="emailBtn" aria-label="Send result by email">Send to Parent</button>
        <button id="resetBtn" aria-label="Search for another student">New Search</button>
      </div>
      <div id="emailStatus" role="alert" aria-live="polite"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
